    function useAnimatedNumber(target, durationMs = 1300, deps = []) {
      const [value, setValue] = useState(0);
      useEffect(() => {
        let start = null;
        let raf;
        const step = (ts) => {
          if (!start) start = ts;
          const t = Math.min(1, (ts - start) / durationMs);
          const eased = 1 - Math.pow(1 - t, 3);
          setValue(target * eased);
          if (t < 1) raf = requestAnimationFrame(step);
        };
        raf = requestAnimationFrame(step);
        return () => cancelAnimationFrame(raf);
      }, deps);
      return value;
    }

                </div>
              ))}

          </div>

          <div className="bg-white border border-ink-200 rounded-2xl p-4">

              <div className="text-sm font-bold text-ink-800">Crecimiento de suscriptores</div>

            </div>
            <svg viewBox="0 0 200 80" className="w-full" preserveAspectRatio="none" style={{ height: 110 }}>
              <defs>
                <linearGradient id="lineFill" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#F5B940" stopOpacity="0.45" />
                  <stop offset="100%" stopColor="#F5B940" stopOpacity="0" />
                </linearGradient>
              </defs>
              {(() => {
                const pts = TREND_SUBS.map((v, i) => [
                  10 + i * (180 / (TREND_SUBS.length - 1)),
                  72 - (v / maxSubs) * 60,
                ]);
                const path = pts.map((p, i) => (i === 0 ? `M ${p[0]} ${p[1]}` : `L ${p[0]} ${p[1]}`)).join(' ');
                const area = `${path} L ${pts[pts.length-1][0]} 75 L ${pts[0][0]} 75 Z`;
                return (
                  <>
                    <path d={area} fill="url(#lineFill)" />
                    <path d={path} stroke="#E07A2B" strokeWidth="2" fill="none" />
                    {pts.map((p, i) => (
                      <circle key={i} cx={p[0]} cy={p[1]} r="2.4" fill="#E07A2B" />
                    ))}
                    {months.map((m, i) => (
                      <text key={m} x={pts[i][0]} y="78" fontSize="6" textAnchor="middle" fill="#94A3B8" fontWeight="600">{m}</text>
                    ))}
                  </>
                );
              })()}

      const [savings, setSavings] = useState(14.20);
      const [totalSubs, setTotalSubs] = useState(847);
      const [selectedSiteId, setSelectedSiteId] = useState('z2');
      const [toast, setToast] = useState(null);

      const selectedSite = SITES.find((s) => s.id === selectedSiteId) || SITES[0];

      const handleUpload = () => {
        setSavings((s) => Math.min(28, s + Math.random() * 2 + 0.8));
        setTotalSubs((n) => n + 1);
        setToast({
          id: Date.now(),
          title: 'Nueva suscriptora confirmada',
          body: `Asignada a ${selectedSite.name}`,
        });
        setTimeout(() => setToast(null), 4000);
      };

      return (
        <div className="min-h-screen flex flex-col">
          <header className="bg-ink-800 px-5 py-3 flex items-center gap-3">
            <div className="w-7 h-7 rounded-full bg-sun-500 flex items-center justify-center text-ink-800">
              <Sun size={16} />
            </div>
            <div className="text-sm font-bold text-sun-100">vecino solar</div>
            <div className="hidden md:block text-xs text-ink-300 ml-2">comunidades solares residenciales</div>
            <div className="ml-auto text-[11px] text-ink-300">Demo en vivo</div>
          </header>

          <div className="md:hidden flex bg-white border-b border-ink-100 px-2 py-2 gap-2">
            <button
              onClick={() => setActiveTab('resident')}
              className={`flex-1 py-2 rounded-lg text-xs font-semibold ${activeTab === 'resident' ? 'bg-sun-500 text-ink-800' : 'bg-ink-50 text-ink-700'}`}
            >Mi panel</button>
            <button
              onClick={() => setActiveTab('operator')}
              className={`flex-1 py-2 rounded-lg text-xs font-semibold ${activeTab === 'operator' ? 'bg-sun-500 text-ink-800' : 'bg-ink-50 text-ink-700'}`}
            >Panel del operador</button>
          </div>

          <div className="hidden md:flex max-w-[1280px] w-full mx-auto px-5 pt-4 gap-4">
            <div className="w-2/5 text-[11px] font-bold text-ink-500 tracking-widest">VISTA DE LA SUSCRIPTORA</div>
            <div className="w-3/5 text-[11px] font-bold text-ink-500 tracking-widest">PANEL DEL OPERADOR</div>
          </div>

          <main className="flex-1 max-w-[1280px] w-full mx-auto px-3 md:px-5 pb-6 pt-2 flex gap-4 flex-col md:flex-row" style={{ minHeight: 720 }}>
            <div className={`md:w-2/5 ${activeTab === 'resident' ? 'block' : 'hidden md:block'} relative`} style={{ minHeight: 720 }}>
              <ResidentPanel savings={savings} onUpload={handleUpload} selectedSite={selectedSite} />
            </div>
            <div className={`md:w-3/5 ${activeTab === 'operator' ? 'block' : 'hidden md:block'} relative`} style={{ minHeight: 720 }}>
              <OperatorPanel sites={SITES} selectedSite={selectedSite} onSelectSite={setSelectedSiteId} totalSubs={totalSubs} lastToast={toast} />
            </div>
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
