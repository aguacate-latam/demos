          <div className="w-16 h-16 rounded-full bg-coral-100 flex items-center justify-center">
            <IconPhone className="w-8 h-8 text-red-700" />
          </div>
          <div className="flex-1">
            <div className="text-xs font-semibold text-red-700 uppercase tracking-wide">Contacto médico principal</div>
            <div className="text-xl font-bold text-slate-900 mt-1">Dr. Alberto García · Neurólogo</div>
            <div className="text-2xl font-bold text-red-700 mt-2">+57 300 123 4567</div>
          </div>
          <button className="bg-red-600 hover:bg-red-700 text-white rounded-lg px-8 py-4 text-base font-semibold transition-colors">
            Llamar ahora
          </button>
        </div>

        <div className="grid grid-cols-2 gap-4">
          {[
            { n: 'Dra. Paola Hernández', r: 'Geriatra', t: '+57 310 987 6543' },
            { n: 'EPS Sanitas · Línea 24/7', r: 'Afiliación médica', t: '+57 601 487 3000' },
            { n: 'Hospital Santa Fe', r: 'Más cercano · 1.2 km', t: '+57 601 603 0303' },
            { n: 'Carmen Lopes · cuidadora activa', r: 'En turno ahora', t: '+55 11 9 8765 4321' },
          ].map((c, i) => (
            <div key={i} className="bg-white rounded-xl border border-slate-200 p-5 flex items-center gap-4">
              <div className="w-11 h-11 rounded-full bg-teal-50 flex items-center justify-center">
                <IconPhone className="w-5 h-5 text-teal-600" />
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm font-semibold text-slate-900 truncate">{c.n}</div>
                <div className="text-xs text-slate-500">{c.r}</div>
                <div className="text-xs text-teal-600 font-medium mt-1">{c.t}</div>
              </div>
              <button className="text-xs font-medium text-teal-600 hover:text-teal-700 px-3 py-1.5 rounded-lg border border-teal-600 hover:bg-teal-50">Llamar</button>
            </div>
          ))}
        </div>

        <div className="bg-white rounded-xl border border-slate-200 p-6">
          <h2 className="text-sm font-semibold text-slate-900 uppercase tracking-wide mb-4">Plan de emergencia</h2>
          <ol className="space-y-3">
            {[
              'Llama al Dr. García (neurólogo principal) primero.',
              'Si no responde en 5 min, llama a Dra. Hernández (geriatra).',
              'Si es caída o pérdida de conciencia, llama al Hospital Santa Fe directamente.',
              'Avisa a Carmen (cuidadora) si no está en turno.',
              'Registra el evento en "Reportes Diarios" con detalle de qué pasó.',
            ].map((p, i) => (
              <li key={i} className="flex items-start gap-3">
                <span className="shrink-0 w-7 h-7 rounded-full bg-clinic-900 text-white text-xs font-bold flex items-center justify-center">{i + 1}</span>
                <span className="text-sm text-slate-700 pt-1">{p}</span>
              </li>
            ))}
          </ol>
        </div>
      </div>
    );

    // ────────────────────────────────────────────────────────────────────────
    // CONFIGURACIÓN
    // ────────────────────────────────────────────────────────────────────────
    const Config = () => {
      const [tab, setTab] = useState('perfil');
      const tabs = [
        { id: 'perfil', label: 'Perfil' },
        { id: 'notif', label: 'Notificaciones' },
        { id: 'pagos', label: 'Pagos' },
        { id: 'priv', label: 'Privacidad' },
      ];

      return (
        <div className="p-8 space-y-6">
          <h1 className="text-2xl font-bold text-slate-900">Configuración</h1>

          <div className="bg-white rounded-xl border border-slate-200">
            <div className="flex border-b border-slate-200">
              {tabs.map(t => (
                <button key={t.id} onClick={() => setTab(t.id)} className={`px-6 py-4 text-sm font-semibold transition-colors ${tab === t.id ? 'text-teal-600 border-b-2 border-teal-600' : 'text-slate-500 hover:text-slate-900'}`}>
                  {t.label}
                </button>
              ))}
            </div>
            <div className="p-8">
              {tab === 'perfil' && (
                <div className="space-y-4 max-w-lg">
                  {[
                    ['Nombre completo', 'Sofía Restrepo'],
                    ['Email', 'sofia.restrepo@gmail.com'],
                    ['Teléfono', '+1 305 555 8712'],
                    ['Zona horaria', 'America/New_York (Miami)'],
                    ['Idioma', 'Español'],
                  ].map(([label, val]) => (
                    <div key={label}>
                      <label className="text-xs font-semibold text-slate-600 uppercase tracking-wide">{label}</label>
                      <input type="text" defaultValue={val} disabled className="w-full mt-1 px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm text-slate-700 cursor-not-allowed"/>
                    </div>
                  ))}
                </div>
              )}
              {tab === 'notif' && (
                <div className="space-y-4 max-w-lg">
                  {[
                    ['Email diario de reporte', true],
                    ['Push de reportes en tiempo real', true],
                    ['Alerta de medicamentos perdidos', true],
                    ['Recordatorio de cobros próximos', false],
                    ['Resumen semanal del cuidado', true],
                  ].map(([label, val]) => (
                    <div key={label} className="flex items-center justify-between py-2 border-b border-slate-100 last:border-0">
                      <span className="text-sm text-slate-700">{label}</span>
                      <div className={`w-11 h-6 rounded-full p-0.5 transition-colors ${val ? 'bg-teal-600' : 'bg-slate-300'}`}>
                        <div className={`w-5 h-5 bg-white rounded-full transition-transform ${val ? 'translate-x-5' : 'translate-x-0'}`}></div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {tab === 'pagos' && (
                <div className="max-w-lg space-y-3">
                  <div className="p-4 border border-slate-200 rounded-lg flex items-center justify-between">
                    <div>
                      <div className="text-sm font-semibold text-slate-900">Bank of America ****4721</div>
                      <div className="text-xs text-slate-500 mt-0.5">Cuenta corriente · Miami, FL</div>
                    </div>
                    <Pill color="mint">Principal</Pill>
                  </div>
                  <button className="text-xs font-medium text-teal-600 flex items-center gap-1">
                    <IconPlus className="w-3 h-3" strokeWidth={2}/>Agregar método de pago
                  </button>
                </div>
              )}
              {tab === 'priv' && (
                <div className="max-w-lg text-sm text-slate-600 space-y-3">
                  <p>Tus datos y los de María Elena están protegidos bajo Ley de Habeas Data (Colombia) y CCPA (California).</p>
                  <p>Los reportes diarios son compartidos solo con los familiares autorizados: Sofía Restrepo, Andrés Restrepo (hermano), y el Dr. García.</p>
                  <button className="text-xs text-teal-600 font-medium">Administrar permisos</button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ────────────────────────────────────────────────────────────────────────
    // APP SHELL
    // ────────────────────────────────────────────────────────────────────────
    const App = () => {
      const [section, setSection] = useState('inicio');
      const [state, setState] = useState({ activeHours: 20, newBlock: false, extraNotif: null });

      const actions = {
        go: (s) => setSection(s),
        onConfirm: () => {
          setState(s => ({
            activeHours: 24,
            newBlock: true,
            extraNotif: 'Match nuevo confirmado · Carmen · miércoles 9am',
          }));
        },
      };

      return (
        <div className="min-h-screen flex bg-slate-50">
          <Sidebar section={section} setSection={setSection} />
          <div className="flex-1 min-w-0 flex flex-col">
            <Topbar extraNotif={state.extraNotif} />
            <main className="flex-1 overflow-y-auto">
              {section === 'inicio' && <Inicio state={state} actions={actions} />}
              {section === 'cuidadores' && <Cuidadores />}
              {section === 'mamá' && <MiMama />}
              {section === 'reportes' && <Reportes />}
              {section === 'calendario' && <Calendario newBlock={state.newBlock} />}
              {section === 'pagos' && <Pagos />}
              {section === 'documentos' && <Documentos />}
              {section === 'mensajes' && <Mensajes />}
              {section === 'emergencias' && <Emergencias />}
              {section === 'config' && <Config />}
            </main>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
